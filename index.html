<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Dashboard Financeiro</title>
</head>
<body class="bg-[#f0f0f0]">
    <main class="h-screen p-12 px-24">
        <h1 class="text-4xl mb-6">Dashboard Financeiro</h1>
        <section class="flex justify-between">
        <div class="bg-white rounded-2xl p-8 w-1/4">
            <h2 class="text-xl font-bold">Saldo</h2>
            <span id="saldo" class="font-bold text-2xl text-blue-600">R$ 0,00</span>
        </div>
        <div class="bg-white rounded-2xl p-8 w-1/4">
            <h2 class="text-xl font-bold">Entradas</h2>
            <span  id="entradas" class="font-bold text-2xl text-green-400">R$ 0,00</span>
        </div>
        <div class="bg-white rounded-2xl p-8 w-1/4">
            <h2 class="text-xl font-bold">Saídas</h2>
            <span  id="saidas" class="font-bold text-2xl text-red-600">R$ 0,00</span>
        </div>
        </section>
        <section class="bg-white rounded-2xl p-8 mt-10">
            <form onsubmit="adicionarTransacao(event)">
                <label for="desc" class="text-lg">Nova Transação</label>
                <input type="text" id="desc" class="bg-[#f0f0f0] rounded-lg p-2 mx-6">
                <label for="valor" class="text-lg">Valor</label>
                <input type="number" name="valor" id="valor" class="bg-[#f0f0f0] rounded-lg p-2 mx-6">
                <select name="tipo" id="tipo" class="p-2 w-30 border rounded-lg mr-50">
                    <option value="Entrada">Entrada</option>
                    <option value="Saida">Saída</option>
                </select>
                <button type="submit" class="bg-blue-700 px-10 py-2 rounded-lg text-white hover:bg-blue-800 cursor-pointer hover:scale-105 duration-1000">Adicionar</button>
            </form>
        </section>
        <section>
            <h2 class="text-3xl py-5">Transações</h2>
           <table class="w-full table-auto text-sm text-left">
            <thead class="bg-gray-50 text-gray-600 font-medium border-b">
                <tr>
                    <th class="py-4 px-6 whitespace-nowrap">Descrição</th>
                    <th class="py-4 px-6 whitespace-nowrap">Data</th>
                    <th class="py-4 px-6 whitespace-nowrap">Tipo de Transação</th>
                    <th class="py-4 px-6 whitespace-nowrap">Valor</th>
                </tr>
            </thead>
                <tbody id="dados" class="text-gray-600 divide-y"></tbody>
            </table>
        </section>
    </main>
    <script src="scripts/dashboard.js"></script>
</body>
</html>
